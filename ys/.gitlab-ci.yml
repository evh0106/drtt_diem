stages:
  - mr

# 공통 Anchor (기본 환경 설정)
.default_mr_job: &default_mr_job
  stage: mr
  image: debian:12
  tags:
    - docker
  allow_failure: true
  before_script:
    - set -e
    - cp glab /usr/local/bin/glab || true
    - chmod +x /usr/local/bin/glab

    # 내부 Nexus apt 설정
    - echo 'deb https://nexus.hmc.co.kr/repository/apt-debian-deb-bookworm/ bookworm main contrib non-free-firmware' > /etc/apt/sources.list.d/source.list
    - echo 'deb https://nexus.hmc.co.kr/repository/apt-debian-deb-bookworm/ bookworm-updates main contrib non-free-firmware' >> /etc/apt/sources.list.d/source.list
    - echo 'deb https://nexus.hmc.co.kr/repository/apt-debian-deb-security bookworm-security main contrib non-free-firmware' >> /etc/apt/sources.list.d/source.list
    - echo 'Acquire::https::Verify-Peer "false";' > /etc/apt/apt.conf.d/99insecure
    - echo 'Acquire::https::Verify-Host "false";' >> /etc/apt/apt.conf.d/99insecure
    - apt update && apt install -y ca-certificates curl bash git jq
    - update-ca-certificates
    - rm -f /etc/apt/apt.conf.d/99insecure || true

    # Git 설정
    - git config --global user.name "ci-bot"
    - git config --global user.email "ci-bot@hmg-corp.io"
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git fetch --all --prune --tags

    # GitLab 인증
    - git remote set-url origin "https://gitlab.hmg-corp.io/$CI_PROJECT_PATH.git"
    - export GITLAB_TOKEN=$GITLAB_TOKEN
    - mkdir -p $HOME/.config/glab-cli
    - |
      cat > $HOME/.config/glab-cli/config.yml <<EOF
      hosts:
        gitlab.hmg-corp.io:
          token: $GITLAB_TOKEN
      EOF
    - glab auth status || true
    - glab --version || true


# =======================================
# 1️⃣ feature → develop (theirs 전략, 직접 지정)
# =======================================
merge_feature_to_develop:
  <<: *default_mr_job
  resource_group: feature-merge
  script:
    - |
      echo "🌀 feature/* 브랜치에서 develop으로 MR 생성 시도"
      chmod 755 glab || ture
      ./glab mr create \
        --source-branch "$CI_COMMIT_BRANCH" \
        --target-branch develop \
        --title "Auto MR: $CI_COMMIT_BRANCH → develop" \
        --description '자동 생성 MR' -y || true
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'

